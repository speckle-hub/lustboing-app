<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — LUSTBOING</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a0033 50%, #2d0a52 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      margin: 0;
      color: #fff;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(230, 0, 92, 0.2);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(230, 0, 92, 0.1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .logo-lust {
      color: #e60052;
    }

    .logo-boing {
      color: #00d2ff;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      opacity: 0.7;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(230, 0, 92, 0.15);
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.12);
      border-color: #e60052;
      box-shadow: 0 0 0 3px rgba(230, 0, 92, 0.1);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .error-message {
      background: rgba(230, 0, 92, 0.15);
      border: 1px solid rgba(230, 0, 92, 0.3);
      color: #ff6b8a;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .login-button {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #e60052 0%, #ff0055 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .login-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(230, 0, 92, 0.3);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-button {
      width: 100%;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      opacity: 0.6;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 12px;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 24px;
      }

      .login-logo {
        font-size: 36px;
      }

      .login-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-lust">LUST</span><span class="logo-boing">BOING</span>
      </div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Access your dashboard</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div id="error-message" class="error-message"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="admin@lustboing.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="login-button" id="login-btn">
        Login
      </button>
    </form>

    <button class="back-button" onclick="window.location.href = 'index.html'">
      ← Back to Home
    </button>

    <div class="login-footer">
      🔞 Admin area. For authorized users only.
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    /* Firebase Config */
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyAf4tc_shnaxS4ExP5L9ajIpcJY_10BRYM",
      authDomain:        "lustboing.firebaseapp.com",
      projectId:         "lustboing",
      storageBucket:     "lustboing.firebasestorage.app",
      messagingSenderId: "366549525069",
      appId:             "1:366549525069:web:29508898addeca87667204",
    };

    let auth = null;

    (function initFirebase() {
      if (typeof firebase === 'undefined') {
        showError('Firebase SDK not loaded');
        return;
      }

      try {
        if (!firebase.apps || firebase.apps.length === 0) {
          firebase.initializeApp(FIREBASE_CONFIG);
        }
        auth = firebase.auth();
      } catch(e) {
        console.error('Firebase init error:', e);
      }
    })();

    async function handleLogin(event) {
      event.preventDefault();

      if (!auth) {
        showError('Firebase not initialized');
        return;
      }

      const email = document.getElementById('email')?.value.trim();
      const password = document.getElementById('password')?.value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-message');

      if (!email || !password) {
        showError('Please enter email and password');
        return;
      }

      if (btn) {
        btn.textContent = 'Logging in...';
        btn.disabled = true;
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
        
        // Redirect to home page on success
        window.location.href = 'index.html';
      } catch (error) {
        let message = 'Login failed. Please check your credentials.';
        
        if (error.code === 'auth/user-not-found') {
          message = 'No account found with this email.';
        } else if (error.code === 'auth/wrong-password') {
          message = 'Invalid password.';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email format.';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Too many login attempts. Try again later.';
        }
        
        showError(message);
      } finally {
        if (btn) {
          btn.textContent = 'Login';
          btn.disabled = false;
        }
      }
    }

    function showError(message) {
      const errorEl = document.getElementById('error-message');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
        
        // Auto-hide after 5 seconds
        setTimeout(() => {
          errorEl.classList.remove('show');
        }, 5000);
      }
    }

    // Check if user is already logged in
    if (auth) {
      auth.onAuthStateChanged(user => {
        if (user) {
          // Already logged in, redirect to home
          window.location.href = 'index.html';
        }
      });
    }

    // Focus on email input
    document.getElementById('email')?.focus();
  </script>

</body>
</html>
